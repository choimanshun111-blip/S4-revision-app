<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <!-- 針對 iPad & 行動裝置優化：禁止縮放、開啟全螢幕 App 模式 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Econ Revision">
  
  <title>Econ 經濟學智能複習系統</title>
  
  <style>
    :root {
      --primary-color: #ff6600; /* 專屬橘色 */
      --primary-hover: #e65c00;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #dddddd;
      --success-color: #2e7d32;
      --error-color: #c62828;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    /* iPad 頂部安全區域與導航 */
    .header {
      background-color: #222;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .teacher-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
      transition: color 0.3s;
    }
    .teacher-btn:hover {
      color: var(--primary-color);
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 15px;
    }

    /* 卡片通用設計 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border-top: 5px solid var(--primary-color);
      margin-bottom: 20px;
    }

    /* 歡迎設定畫面 */
    .welcome-title {
      text-align: center;
      margin-bottom: 25px;
    }
    .welcome-title h2 {
      color: var(--primary-color);
      margin: 5px 0 0 0;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary-color);
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s, transform 0.1s;
    }
    .btn:hover { background-color: var(--primary-hover); }
    .btn:active { transform: scale(0.98); }

    /* 答題畫面佈局 */
    #quiz-panel { display: none; }
    
    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
      color: #666;
    }

    .timer-badge {
      background: #333;
      color: #fff;
      padding: 5px 12px;
      border-radius: 15px;
      font-family: monospace;
      font-size: 16px;
      font-weight: bold;
    }

    .progress-bar-container {
      background: #e0e0e0;
      height: 6px;
      border-radius: 3px;
      width: 100%;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      background: var(--primary-color);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    .question-box {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
      word-wrap: break-word;
    }

    /* 經濟學考卷標準表格風格 */
    .econ-table {
      width: 100%;
      max-width: 500px;
      margin: 15px auto;
      border-collapse: collapse;
      font-size: 15px;
    }
    .econ-table th, .econ-table td {
      border: 1px solid #000;
      padding: 8px;
      text-align: center;
    }
    .econ-table th {
      background-color: #f2f2f2;
      font-weight: bold;
    }

    /* 選項設計 */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .option-btn {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }

    .option-btn:hover {
      border-color: var(--primary-color);
      background: #fffcf9;
    }

    .option-letter {
      background: #e9ecef;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }

    /* 選項狀態樣式 */
    .option-btn.selected {
      border-color: var(--primary-color);
      background: #fff3eb;
    }
    .option-btn.selected .option-letter {
      background: var(--primary-color);
      color: white;
    }

    .option-btn.correct-ans {
      border-color: var(--success-color);
      background: #e8f5e9;
    }
    .option-btn.correct-ans .option-letter {
      background: var(--success-color);
      color: white;
    }

    .option-btn.wrong-ans {
      border-color: var(--error-color);
      background: #ffebee;
    }
    .option-btn.wrong-ans .option-letter {
      background: var(--error-color);
      color: white;
    }

    /* 說明區域 (即時回饋模式下顯示) */
    .explanation-box {
      background: #eef7ff;
      border-left: 4px solid #0066cc;
      padding: 15px;
      border-radius: 0 8px 8px 0;
      margin-top: 15px;
      display: none;
    }

    /* 分析畫面 */
    #analysis-panel { display: none; }
    
    .score-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 8px solid var(--primary-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px auto;
    }
    .score-num { font-size: 32px; font-weight: bold; color: #222; }
    .score-label { font-size: 12px; color: #666; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }
    .summary-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #eee;
    }
    .summary-val { font-size: 20px; font-weight: bold; color: var(--primary-color); }

    /* 技能強弱分析 */
    .skill-bar-container {
      margin-bottom: 15px;
    }
    .skill-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .skill-progress-bg {
      background: #eee;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
    }
    .skill-progress {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #ff9900, var(--primary-color));
    }

    /* 錯題檢視 */
    .review-item {
      border-bottom: 1px dashed #ccc;
      padding: 15px 0;
    }
    .review-item:last-child { border-bottom: none; }
    .status-tag {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
    .status-tag.correct { background: #e8f5e9; color: #2e7d32; }
    .status-tag.wrong { background: #ffebee; color: #c62828; }

    /* 自訂通知視窗 */
    #alert-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-box {
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
  </style>

  <!-- 引入 Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- 頂部導航 -->
<div class="header">
  <h1>📚 Econ 經濟學測驗</h1>
  <button class="teacher-btn" onclick="goToTeacher()" title="老師後台">⚙️</button>
</div>

<div class="container">

  <!-- ================= 畫面 1：設定與歡迎頁 ================= -->
  <div id="setup-panel" class="card">
    <div class="welcome-title">
      <h2>歡迎進行 Econ 複習測驗</h2>
      <p style="color:#666; font-size:14px; margin-top:5px;">開始挑戰，智能系統會為你分析強弱章節</p>
    </div>

    <label for="student-name">你的姓名：</label>
    <input type="text" id="student-name" placeholder="例如：Wong Lok To" autocomplete="off">

    <label for="student-class">班別：</label>
    <select id="student-class">
      <option value="S4 (X1)">S4 (X1)</option>
      <option value="S4 (X2)">S4 (X2)</option>
    </select>

    <label for="chapters-select">選擇章節：</label>
    <select id="chapters-select">
      <option value="ALL">所有章節混合練習</option>
      <option value="Ch8_Firms">Ch.8 Firms (企業)</option>
      <option value="Ch9_Goods&Division of labour">Ch.9 Goods & Division of Labour (物品與分工)</option>
      <option value="Ch.10_Factors of production">Ch.10 Factors of Production (生產要素)</option>
    </select>

    <label for="questions-count">題目數量：</label>
    <select id="questions-count">
      <option value="5">5 題</option>
      <option value="10" selected>10 題</option>
      <option value="15">15 題</option>
      <option value="20">20 題</option>
    </select>

    <label for="feedback-mode">作答模式：</label>
    <select id="feedback-mode">
      <option value="instant">即時回饋（每題立刻看解析，推薦學習用）</option>
      <option value="exam">模擬考試（全部答完才看分數與解析）</option>
    </select>

    <button class="btn" id="start-btn" onclick="startQuiz()">🚀 開始測驗</button>
  </div>

  <!-- ================= 畫面 2：測驗與計時頁 ================= -->
  <div id="quiz-panel" class="card">
    <div class="quiz-meta">
      <div>目前題數：<strong id="current-q-num">1</strong> / <span id="total-q-num">10</span></div>
      <div class="timer-badge" id="timer-display">00:00</div>
    </div>
    
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- 題目主體 -->
    <div class="question-box" id="question-text">
      載入中...
    </div>

    <!-- 表格插圖顯示器 -->
    <div id="table-container" style="overflow-x:auto;"></div>

    <!-- 選項按鈕 -->
    <div class="options-list">
      <button class="option-btn" id="opt-A" onclick="selectOption('A')">
        <span class="option-letter">A</span> <span class="option-text" id="text-A">選項 A</span>
      </button>
      <button class="option-btn" id="opt-B" onclick="selectOption('B')">
        <span class="option-letter">B</span> <span class="option-text" id="text-B">選項 B</span>
      </button>
      <button class="option-btn" id="opt-C" onclick="selectOption('C')">
        <span class="option-letter">C</span> <span class="option-text" id="text-C">選項 C</span>
      </button>
      <button class="option-btn" id="opt-D" onclick="selectOption('D')">
        <span class="option-letter">D</span> <span class="option-text" id="text-D">選項 D</span>
      </button>
    </div>

    <!-- 說明區塊 -->
    <div class="explanation-box" id="explanation-box">
      <strong>📝 題解說明：</strong>
      <div id="explanation-text" style="margin-top:5px; font-size:14px;"></div>
    </div>

    <button class="btn" id="action-btn" onclick="nextQuestion()" style="margin-top:15px; display:none;">下一題 ➡️</button>
  </div>

  <!-- ================= 畫面 3：最後成績與強弱分析頁 ================= -->
  <div id="analysis-panel" class="card">
    <div class="welcome-title">
      <h2>🏆 測驗完成與智能分析</h2>
      <p id="analysis-subtitle" style="color:#666; font-size:14px; margin:5px 0 0 0;"></p>
    </div>

    <div class="score-circle">
      <span class="score-num" id="score-val">0 / 0</span>
      <span class="score-label">答對題數</span>
    </div>

    <div class="summary-grid">
      <div class="summary-item">
        <div class="score-label">精準度 (Accuracy)</div>
        <div class="summary-val" id="acc-val">0%</div>
      </div>
      <div class="summary-item">
        <div class="score-label">總共花費時間</div>
        <div class="summary-val" id="time-val">0s</div>
      </div>
    </div>

    <h2 style="margin-bottom:10px;">📊 考核知識重點強弱分佈 (Skill Analysis)</h2>
    <div id="skills-analysis-container" style="margin-bottom:30px;">
      <!-- JavaScript 會根據 Skill_Type 計算答對率並生成進度條 -->
    </div>

    <h2 style="margin-bottom:15px; border-bottom: 2px solid var(--border-color); padding-bottom:5px;">📝 本次練習詳情與錯題回顧</h2>
    <div id="review-list">
      <!-- 顯示所有題目，綠色表示對，紅色表示錯 -->
    </div>

    <button class="btn" onclick="location.reload()" style="margin-top:20px; background-color:#4a90e2;">🔄 再挑戰一次</button>
  </div>

</div>

<!-- 自訂彈窗 -->
<div id="alert-modal">
  <div class="modal-box">
    <h3 id="alert-title" style="margin-top:0;">提醒</h3>
    <p id="alert-msg"></p>
    <button class="btn" onclick="closeAlert()" style="padding:8px 15px; font-size:14px; width:auto;">確定</button>
  </div>
</div>

<script>
  // ==========================================
  // 🔴 步驟 1：請核對你的 Firebase Config 是否一致
  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyDzDr0k3nxb2nZhgwXSNWMYgLo_e_dTCYU",
    authDomain: "s4-revision-app.firebaseapp.com",
    projectId: "s4-revision-app",
    storageBucket: "s4-revision-app.firebasestorage.app",
    messagingSenderId: "36649118965",
    appId: "1:36649118965:web:37415c384a55bcff5ee9bc"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 狀態管理變數
  let studentName = "";
  let studentClass = "";
  let selectedChapter = "";
  let targetCount = 10;
  let feedbackMode = "instant"; // "instant" or "exam"

  let questionsPool = []; // 撈出來的題庫
  let quizQuestions = []; // 本次隨機挑選的題目
  let currentIndex = 0;
  let score = 0;
  let selectedAns = null; // 當前選擇的答案
  let isAnswered = false; // 當前題是否已送出/確認
  
  // 計時器變數
  let startTime;
  let timerInterval;
  let totalTimeSpentSeconds = 0;

  // 紀錄學生的作答過程，用於最後分析
  let studentAnswers = []; // [{questionObj, selected, isCorrect}]

  // 自訂 Alert 功能
  function customAlert(title, msg) {
    document.getElementById('alert-title').innerText = title;
    document.getElementById('alert-msg').innerText = msg;
    document.getElementById('alert-modal').style.display = 'flex';
  }
  function closeAlert() {
    document.getElementById('alert-modal').style.display = 'none';
  }

  // 快速切換到老師後台
  function goToTeacher() {
    window.location.href = "teacher.html";
  }

  // ==========================================
  // 🟢 步驟 2：開始測驗、撈取題庫、隨機分配
  // ==========================================
  async function startQuiz() {
    studentName = document.getElementById('student-name').value.trim();
    studentClass = document.getElementById('student-class').value;
    selectedChapter = document.getElementById('chapters-select').value;
    targetCount = parseInt(document.getElementById('questions-count').value);
    feedbackMode = document.getElementById('feedback-mode').value;

    if (!studentName) {
      customAlert("請輸入姓名", "請填寫姓名以便老師登記你優秀的表現！");
      return;
    }

    const startBtn = document.getElementById('start-btn');
    startBtn.innerText = "⏳ 正在分析題庫中...";
    startBtn.disabled = true;

    try {
      let queryRef = db.collection("questions");
      
      // 若非 ALL，則篩選特定章節
      if (selectedChapter !== "ALL") {
        queryRef = queryRef.where("Chapter", "==", selectedChapter);
      }

      const snapshot = await queryRef.get();
      
      if (snapshot.empty) {
        customAlert("題庫空空如也", `這章節 (${selectedChapter}) 目前還沒有題目。請先通知老師上傳題目！`);
        startBtn.innerText = "🚀 開始測驗";
        startBtn.disabled = false;
        return;
      }

      questionsPool = [];
      snapshot.forEach(doc => {
        questionsPool.push(doc.data());
      });

      // 洗牌演算法 (Shuffle) 隨機挑出題目
      shuffleArray(questionsPool);
      quizQuestions = questionsPool.slice(0, Math.min(targetCount, questionsPool.length));

      // 初始化測驗
      currentIndex = 0;
      score = 0;
      studentAnswers = [];
      
      // 切換面板
      document.getElementById('setup-panel').style.display = 'none';
      document.getElementById('quiz-panel').style.display = 'block';

      // 啟動計時
      startTime = Date.now();
      startTimer();

      // 載入第一題
      loadQuestion();

    } catch (error) {
      customAlert("系統連線錯誤", error.message);
      startBtn.innerText = "🚀 開始測驗";
      startBtn.disabled = false;
    }
  }

  // 陣列洗牌法
  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  // 計時器邏輯
  function startTimer() {
    timerInterval = setInterval(() => {
      const elapsed = Date.now() - startTime;
      totalTimeSpentSeconds = Math.floor(elapsed / 1000);
      const mins = String(Math.floor(totalTimeSpentSeconds / 60)).padStart(2, '0');
      const secs = String(totalTimeSpentSeconds % 60).padStart(2, '0');
      document.getElementById('timer-display').innerText = `${mins}:${secs}`;
    }, 1000);
  }

  // ==========================================
  // 🔵 步驟 3：答題流程與經濟學表格排版
  // ==========================================
  function loadQuestion() {
    isAnswered = false;
    selectedAns = null;
    
    // 重設選項按鈕狀態
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.className = 'option-btn';
    });
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('action-btn').style.display = 'none';

    // 取得當前題目
    const q = quizQuestions[currentIndex];
    
    // 更新題號與進度條
    document.getElementById('current-q-num').innerText = currentIndex + 1;
    document.getElementById('total-q-num').innerText = quizQuestions.length;
    const progressPercent = ((currentIndex) / quizQuestions.length) * 100;
    document.getElementById('progress-bar').style.style = `width: ${progressPercent}%`;
    document.getElementById('progress-bar').style.width = progressPercent + "%";

    // 渲染題目文字
    document.getElementById('question-text').innerHTML = `${q.Question}`;

    // 處理內建 HTML 表格或 CSV 轉入表格
    const tableContainer = document.getElementById('table-container');
    tableContainer.innerHTML = "";
    
    // 渲染選項
    document.getElementById('text-A').innerText = q.A;
    document.getElementById('text-B').innerText = q.B;
    document.getElementById('text-C').innerText = q.C;
    document.getElementById('text-D').innerText = q.D;
  }

  // 當點擊 A, B, C, D 選項
  function selectOption(letter) {
    if (isAnswered) return; // 已送出就無法重選

    selectedAns = letter;
    
    // 清除其他選取狀態
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    
    // 將選中的按鈕變色
    document.getElementById(`opt-${letter}`).classList.add('selected');

    if (feedbackMode === 'instant') {
      // 即時模式下，選完直接開牌！
      revealAnswer();
    } else {
      // 考試模式下，顯示「確認下一題」按鈕
      document.getElementById('action-btn').innerText = (currentIndex === quizQuestions.length - 1) ? "🏁 送出全卷" : "下一題 ➡️";
      document.getElementById('action-btn').style.display = 'block';
    }
  }

  // 即時開牌：回饋正確與否，並顯示 explanation
  function revealAnswer() {
    isAnswered = true;
    const q = quizQuestions[currentIndex];
    const isCorrect = (selectedAns === q.Answer);

    // 移除選取，套用對錯顏色
    document.getElementById(`opt-${selectedAns}`).classList.remove('selected');
    
    if (isCorrect) {
      score++;
      document.getElementById(`opt-${selectedAns}`).classList.add('correct-ans');
    } else {
      document.getElementById(`opt-${selectedAns}`).classList.add('wrong-ans');
      document.getElementById(`opt-${q.Answer}`).classList.add('correct-ans'); // 亮出正解
    }

    // 記錄這題作答狀況
    studentAnswers.push({
      questionObj: q,
      selected: selectedAns,
      isCorrect: isCorrect
    });

    // 顯示詳細題解
    document.getElementById('explanation-text').innerHTML = q.Explanation || "本題暫無解析。";
    document.getElementById('explanation-box').style.display = 'block';

    // 顯示「下一題」
    document.getElementById('action-btn').innerText = (currentIndex === quizQuestions.length - 1) ? "🏁 查看分析報告" : "下一題 ➡️";
    document.getElementById('action-btn').style.display = 'block';
  }

  // 按下「下一題 / 查看報告」
  function nextQuestion() {
    if (feedbackMode === 'exam') {
      // 考試模式下，當點擊下一題才記錄作答
      const q = quizQuestions[currentIndex];
      const isCorrect = (selectedAns === q.Answer);
      if (isCorrect) score++;

      studentAnswers.push({
        questionObj: q,
        selected: selectedAns,
        isCorrect: isCorrect
      });
    }

    if (currentIndex < quizQuestions.length - 1) {
      currentIndex++;
      loadQuestion();
    } else {
      // 全部答完，結算！
      finishQuiz();
    }
  }

  // ==========================================
  // 🟣 步驟 4：智能分析 & 成績自動存入 Firebase
  // ==========================================
  async function finishQuiz() {
    clearInterval(timerInterval);
    document.getElementById('quiz-panel').style.display = 'none';
    document.getElementById('analysis-panel').style.display = 'block';

    const accuracyVal = Math.round((score / quizQuestions.length) * 100);
    const minStr = Math.floor(totalTimeSpentSeconds / 60);
    const secStr = totalTimeSpentSeconds % 60;
    const timeSpentString = `${minStr}m ${secStr}s`;

    // 渲染最後數據
    document.getElementById('analysis-subtitle').innerText = `同學: ${studentName} (${studentClass}) 恭喜你完成了練習！`;
    document.getElementById('score-val').innerText = `${score} / ${quizQuestions.length}`;
    document.getElementById('acc-val').innerText = `${accuracyVal}%`;
    document.getElementById('time-val').innerText = timeSpentString;

    // 1. 生成技能分析
    analyzeSkills();

    // 2. 顯示錯題回顧與解析
    renderReview();

    // 3. 自動寫入 Firebase「排行榜與學生成績表」(student_results)
    try {
      await db.collection("student_results").add({
        Name: studentName,
        Class: studentClass,
        Chapters_Chosen: selectedChapter === 'ALL' ? 'Mixed 章節混合練習' : selectedChapter,
        Total_Correct: score,
        Total_Questions: quizQuestions.length,
        Score: score, // 相容字段
        Accuracy: `${accuracyVal}%`,
        Time_Spent: timeSpentString,
        Timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log("成績已自動上傳 Firebase 資料庫！");
    } catch (e) {
      console.error("成績自動備份失敗：", e.message);
    }
  }

  // 技能強弱分析：依據 Skill_Type/Chapter 計算答對比例
  function analyzeSkills() {
    const container = document.getElementById('skills-analysis-container');
    container.innerHTML = "";

    // 統計各 Skill_Type 的答對與總數
    let stats = {}; // { 'SkillName': {correct: 0, total: 0} }

    studentAnswers.forEach(ans => {
      const skill = ans.questionObj.Skill_Type || "一般基礎概念";
      if(!stats[skill]) {
        stats[skill] = { correct: 0, total: 0 };
      }
      stats[skill].total++;
      if(ans.isCorrect) stats[skill].correct++;
    });

    // 渲染條形進度圖
    for(let skill in stats) {
      const correct = stats[skill].correct;
      const total = stats[skill].total;
      const pct = Math.round((correct / total) * 100);
      
      // 計算評語
      let comment = "有待改善 ⚠️";
      if(pct >= 80) comment = "完美掌握 ✨";
      else if(pct >= 50) comment = "表現不錯 👍";

      container.innerHTML += `
        <div class="skill-bar-container">
          <div class="skill-label">
            <span><strong>${skill}</strong> (${correct}/${total} 題)</span>
            <span style="color:${pct >= 70 ? 'var(--success-color)' : 'var(--error-color)'}">${comment} ${pct}%</span>
          </div>
          <div class="skill-progress-bg">
            <div class="skill-progress" style="width: ${pct}%"></div>
          </div>
        </div>
      `;
    }
  }

  // 錯題回顧詳細展開
  function renderReview() {
    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = "";

    studentAnswers.forEach((ans, index) => {
      const q = ans.questionObj;
      const isCorrect = ans.isCorrect;
      
      reviewList.innerHTML += `
        <div class="review-item">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <strong>第 ${index + 1} 題：${q.ID || '無題號'}</strong>
            <span class="status-tag ${isCorrect ? 'correct' : 'wrong'}">
              ${isCorrect ? '答對 (Correct) ✅' : '答錯 (Wrong) ❌'}
            </span>
          </div>
          <p style="margin:5px 0;">${q.Question}</p>
          <div style="font-size:14px; margin-top:8px; padding-left:10px; border-left:3px solid #ccc;">
            <div style="color:${isCorrect ? 'var(--success-color)' : 'var(--error-color)'}">
              你的選擇：${ans.selected}. ${q[ans.selected]}
            </div>
            <div style="color:var(--success-color); font-weight:bold; margin-top:3px;">
              正確答案：${q.Answer}. ${q[q.Answer]}
            </div>
          </div>
          
          <details style="margin-top:10px; font-size:14px; cursor:pointer; color:#0055b3;">
            <summary>查看詳細題目解析說明</summary>
            <div style="padding:10px; background:#f0f8ff; border-radius:5px; color:#222; margin-top:5px;">
              ${q.Explanation || "暫時無本題詳細解說。"}
            </div>
          </details>
        </div>
      `;
    });
  }
</script>
